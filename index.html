<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pixel Mosaic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.25);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.5px;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="hint">солнышко, зажми пальчиком или перезагрузи сайтик</div>
  <script>
    (() => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const hint = document.getElementById('hint');

      let W, H;
      let particles = [];
      let pressed = false;
      let imageLoaded = false;
      let hintHidden = false;

      // Dynamic cell size: smaller screens get slightly larger cells for perf
      const isMobile = ('ontouchstart' in window) || window.innerWidth < 768;
      const CELL = 2;
      const DRAW_SIZE = CELL - 1;
      const EASE_IN = 0.08;    // speed of assembling
      const EASE_OUT = 0.03;   // speed of scattering
      const DRIFT_SPEED = 0.4; // floating drift speed
      const FLOAT_RANGE = 2;   // floating wiggle amplitude
      const FILL_RATIO = isMobile ? 0.90 : 0.75; // how much of the screen the image fills

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (imageLoaded) buildParticles();
      }

      const images = [
        'IMG_3135.JPG',
        'IMG_3136.JPG',
        'IMG_3137.JPG',
        'открытка с котиками.jpg'
      ];

      const img = new Image();
      img.onload = () => {
        imageLoaded = true;
        resize();
        requestAnimationFrame(loop);
      };
      img.src = images[Math.floor(Math.random() * images.length)];

      function buildParticles() {
        // Draw image to offscreen canvas to sample pixels
        const oc = document.createElement('canvas');
        const octx = oc.getContext('2d');

        // Calculate image dimensions to fit centered on screen
        const imgAspect = img.width / img.height;
        const screenAspect = W / H;
        let drawW, drawH;

        if (imgAspect > screenAspect) {
          drawW = W * FILL_RATIO;
          drawH = drawW / imgAspect;
        } else {
          drawH = H * FILL_RATIO;
          drawW = drawH * imgAspect;
        }

        const cols = Math.floor(drawW / CELL);
        const rows = Math.floor(drawH / CELL);

        // Exact draw dimensions snapped to grid
        drawW = cols * CELL;
        drawH = rows * CELL;

        oc.width = cols;
        oc.height = rows;
        octx.drawImage(img, 0, 0, cols, rows);
        const data = octx.getImageData(0, 0, cols, rows).data;

        const offsetX = (W - drawW) / 2;
        const offsetY = (H - drawH) / 2;

        const oldParticles = particles;
        particles = [];

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const idx = (row * cols + col) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];
            const a = data[idx + 3];
            if (a < 30) continue; // skip near-transparent

            // Target position (grid position)
            const tx = offsetX + col * CELL;
            const ty = offsetY + row * CELL;

            // Reuse old particle position if exists, else random
            const old = oldParticles[particles.length];
            const sx = old ? old.x : Math.random() * W;
            const sy = old ? old.y : Math.random() * H;

            particles.push({
              x: sx,
              y: sy,
              tx: tx,
              ty: ty,
              color: `rgb(${r},${g},${b})`,
              // Drift velocity
              vx: (Math.random() - 0.5) * DRIFT_SPEED * 2,
              vy: (Math.random() - 0.5) * DRIFT_SPEED * 2,
              // Floating phase
              phase: Math.random() * Math.PI * 2,
              phaseSpeed: 0.01 + Math.random() * 0.02,
              // For stagger effect — distance from center
              dist: Math.sqrt((col - cols / 2) ** 2 + (row - rows / 2) ** 2),
              settled: 0, // 0 = floating, 1 = settled
            });
          }
        }
      }

      function loop(t) {
        ctx.clearRect(0, 0, W, H);

        const dt = 1; // fixed timestep for simplicity

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          if (pressed) {
            // Ease toward target
            p.settled += (1 - p.settled) * EASE_IN;
            p.x += (p.tx - p.x) * EASE_IN;
            p.y += (p.ty - p.y) * EASE_IN;
          } else {
            // Ease away from settled
            p.settled += (0 - p.settled) * EASE_OUT;

            // Drift
            p.phase += p.phaseSpeed;
            p.x += p.vx + Math.sin(p.phase) * FLOAT_RANGE * 0.1;
            p.y += p.vy + Math.cos(p.phase * 0.7) * FLOAT_RANGE * 0.1;

            // Wrap around screen edges with some padding
            const pad = CELL * 2;
            if (p.x < -pad) p.x = W + pad;
            if (p.x > W + pad) p.x = -pad;
            if (p.y < -pad) p.y = H + pad;
            if (p.y > H + pad) p.y = -pad;

            // Subtle pull toward target to prevent full chaos
            // (particles remember where they belong)
            // No pull when fully floating — let them roam free
          }

          // Draw
          const size = DRAW_SIZE * (0.5 + p.settled * 0.5);
          const alpha = 0.4 + p.settled * 0.6;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;

          // Gentle sway when settled — smooth oscillation so they feel alive
          let jx = 0, jy = 0;
          if (p.settled > 0.5) {
            const sway = p.settled * 0.8;
            jx = Math.sin(p.phase * 1.3) * sway;
            jy = Math.cos(p.phase * 0.9) * sway;
          }

          if (p.settled > 0.95) {
            ctx.fillRect(p.x + jx, p.y + jy, DRAW_SIZE, DRAW_SIZE);
          } else {
            ctx.fillRect(p.x + jx, p.y + jy, size, size);
          }
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
      }

      // Input handling
      function onPress() {
        pressed = true;
        if (!hintHidden) {
          hintHidden = true;
          hint.style.opacity = '0';
        }
      }
      function onRelease() {
        pressed = false;
      }

      window.addEventListener('mousedown', onPress);
      window.addEventListener('mouseup', onRelease);
      window.addEventListener('touchstart', (e) => { e.preventDefault(); onPress(); }, { passive: false });
      window.addEventListener('touchend', (e) => { e.preventDefault(); onRelease(); }, { passive: false });
      window.addEventListener('touchcancel', onRelease);
      window.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', () => setTimeout(resize, 100));
      window.addEventListener('contextmenu', e => e.preventDefault());

      resize();
    })();
  </script>
</body>

</html>
